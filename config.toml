# My website's configuration.

# The URL the site will be built for
base_url = "https://rietty.com"

# Theme to use
theme = "terminimal"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

taxonomies = [
    {name = "tags"},
]

[markdown]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
highlight_code = true

# Below section is for configuring everything else for site.
[extra]
accent_color = "green"
background_color = "dark"

logo_text = "Rietty's Ramblings"

copyright_html = "Copyright © 2022 - Juliette H. Lavoie"

# Pagination
enable_post_view_navigation = true

# Language
default_language = "en"

# Font
use_full_hack_font = true

# Favicon
favicon = "/favicon.png"
favicon_mimetype = "image/png"

# Create a menu.
menu_items = [
	{name = "blog", url = "$BASE_URL"},
	{name = "tags", url = "$BASE_URL/tags"},
	{name = "archive", url = "$BASE_URL/archive"},
	{name = "about me", url = "$BASE_URL/about"},
	{name = "github", url = "https://github.com/rietty", newtab = true},
]
